<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>PRUV Marketing — Coming Soon</title>
  <style>
    :root { --bg: #0a0a0a; --text: #f4f4f5; --muted: #a1a1aa; --accent: #10b981; }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .wordmark { font-size: 3rem; font-weight: 800; letter-spacing: 0.1em; margin: 0 0 18px; }
    .wordmark span { color: var(--accent); }
    h1 { font-size: 1.4rem; font-weight: 600; margin: 0 0 10px; }
    p { color: var(--muted); max-width: 460px; margin: 0 auto 8px; line-height: 1.6; }
    .accent { color: var(--accent); font-weight: 600; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .contact { margin-top: 34px; font-size: 0.95rem; }
  </style>
</head>
<body>
  <main>
    <p class="wordmark">PRUV<span>.</span></p>
    <h1>The Evergreen Architecture Protocol</h1>
    <p><span class="accent">Build once. Keep profiting.</span></p>
    <p>Structural stability for your ad accounts — coming soon.</p>
    <p class="contact">Early interest? <a href="mailto:hello@pruvmarketing.com?subject=Early%20Interest%20%E2%80%94%20PRUV%20Marketing">hello@pruvmarketing.com</a></p>
  </main>
</body>
</html>
